<div class="page">
  <div class="card">
    <h1>Cadastro de Pessoa</h1>

    <div class="success-message" *ngIf="successMessage">
      <strong>Cadastro realizado com sucesso</strong>
      <p>{{ successMessage }}</p>
      <p *ngIf="generatedLogin">
        Login gerado:
        <strong>{{ generatedLogin }}</strong>
      </p>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      <strong>Falha no cadastro</strong>
      <p>{{ errorMessage }}</p>
    </div>

    <div class="form-group">
      <label for="name">Nome completo</label>
      <input
        id="name"
        type="text"
        [(ngModel)]="name"
        placeholder="Digite o nome completo">
    </div>

    <div class="form-group">
      <label for="cpf">CPF</label>
      <input
        id="cpf"
        type="text"
        [(ngModel)]="cpf"
        maxlength="14"
        placeholder="Digite somente números">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        placeholder="exemplo@email.com">
    </div>

    <div class="form-group">
      <label for="birthDate">Data de nascimento</label>
      <input
        id="birthDate"
        type="date"
        [(ngModel)]="birthDate">
    </div>

    <div class="form-group">
      <label for="zipCode">CEP</label>
      <input
        id="zipCode"
        type="text"
        [(ngModel)]="zipCode"
        maxlength="9"
        placeholder="Digite somente números">
    </div>

    <div class="form-group">
      <label for="complement">Complemento</label>
      <input
        id="complement"
        type="text"
        [(ngModel)]="complement"
        placeholder="Apartamento, número da casa, bloco etc.">
    </div>

    <button
      type="button"
      (click)="register()"
      [disabled]="isLoading">
      {{ isLoading ? 'Cadastrando...' : 'Cadastrar Pessoa' }}
    </button>
  </div>
</div>
